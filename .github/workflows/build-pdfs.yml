name: Build PDFs

# Compile les trois cahiers des charges (fr/en via pdflatex, ar via XeLaTeX),
# vérifie que les trois masters restent synchronisés, et que les PDF versionnés
# correspondent bien à leurs sources. Un oubli de \input, une erreur LaTeX ou un
# PDF non régénéré après modification fait échouer le workflow.

on:
  push:
    paths:
      - 'cahier de charge/**'
      - 'scripts/check-sync.sh'
      - 'scripts/check-pdf-current.sh'
      - '.github/workflows/build-pdfs.yml'
  pull_request:
    paths:
      - 'cahier de charge/**'
      - 'scripts/check-sync.sh'
      - 'scripts/check-pdf-current.sh'
      - '.github/workflows/build-pdfs.yml'
  workflow_dispatch:

jobs:
  sync-check:
    name: Cohérence trilingue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier la synchro des \input (fr/en/ar)
        run: bash scripts/check-sync.sh

  build:
    name: Compiler ${{ matrix.lang }}
    needs: sync-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: fr
            dir: cahier de charge/fr
            root: cahier_des_charges_fr.tex
            xelatex: false
            pre_compile: ''
          - lang: en
            dir: cahier de charge/en
            root: cahier_des_charges_en.tex
            xelatex: false
            pre_compile: ''
          - lang: ar
            dir: cahier de charge/ar
            root: cahier_des_charges_ar.tex
            xelatex: true
            # L'image de l'action est une Alpine avec TeXLive *complet* : amiri y
            # est deja present et son depot tlmgr est en lecture seule, donc
            # `tlmgr install` sort en 255 et tue le job. On se contente de
            # verifier que la police est bien la, sans jamais faire echouer
            # l'etape : le master bascule seul sur son repli (\IfFontExistsTF).
            pre_compile: kpsewhich Amiri-Regular.ttf || true
    steps:
      # fetch-depth: 0 — la vérification de fraîcheur lit les dates de commit du
      # PDF et de ses sources. Un clone superficiel les tronque et rendrait un
      # verdict faux ; le script refuse d'ailleurs de s'exécuter dessus.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # La fraîcheur se juge sur l'historique, avant toute compilation : inutile
      # de compiler pour découvrir qu'un PDF n'a pas été régénéré.
      - name: Vérifier que le PDF versionné est à jour (${{ matrix.lang }})
        id: fraicheur
        run: |
          set -o pipefail
          bash scripts/check-pdf-current.sh \
            "${{ matrix.dir }}/cahier_des_charges_${{ matrix.lang }}.pdf" \
            "${{ matrix.dir }}" 2>&1 | tee /tmp/fraicheur-${{ matrix.lang }}.txt

      # L'écart part sur stderr, donc dans des logs illisibles sans
      # authentification. On le republie en annotation, qui est publique.
      - name: Remonter le défaut de fraîcheur (${{ matrix.lang }})
        if: failure() && steps.fraicheur.outcome == 'failure'
        run: |
          f=/tmp/fraicheur-${{ matrix.lang }}.txt
          [ -f "$f" ] || { echo "::error::[${{ matrix.lang }}] aucun rapport de fraîcheur"; exit 0; }
          echo "::error::[${{ matrix.lang }}] $(tr '\n' '§' < "$f" | cut -c1-1800)"

      - name: Compiler (${{ matrix.lang }})
        id: compile
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ${{ matrix.dir }}
          root_file: ${{ matrix.root }}
          latexmk_use_xelatex: ${{ matrix.xelatex }}
          # « Traditional Arabic » n'existe pas dans l'image : le master bascule
          # seul sur son repli Amiri (cf. \IfFontExistsTF). Seul l'arabe a une
          # étape préalable — fr/en n'ont aucune police à résoudre.
          pre_compile: ${{ matrix.pre_compile }}

      # Les logs Actions exigent une authentification ; les ANNOTATIONS, elles,
      # sont publiques. On y recopie l'erreur LaTeX pour qu'un échec reste
      # diagnosticable sans accès privilégié au dépôt.
      - name: Remonter l'erreur LaTeX (${{ matrix.lang }})
        if: failure() && steps.compile.outcome == 'failure'
        run: |
          log="${{ matrix.dir }}/cahier_des_charges_${{ matrix.lang }}.log"
          if [ ! -f "$log" ]; then
            echo "::error::[${{ matrix.lang }}] aucun .log produit — échec avant le premier passage LaTeX"
            exit 0
          fi
          # Contexte autour de la PREMIERE erreur : la ligne seule ne dit pas
          # quelle macro est indefinie, LaTeX l'imprime sur les lignes suivantes.
          extrait=$(grep -nE -A8 '^!|\.tex:[0-9]+:|Fatal error|Emergency stop' "$log" \
                    | head -40 | tr '\n' '§')
          echo "::error::[${{ matrix.lang }}] ${extrait:-aucune ligne d erreur reconnue dans le log}"

      - name: Publier le PDF (${{ matrix.lang }})
        uses: actions/upload-artifact@v4
        with:
          name: cahier-des-charges-${{ matrix.lang }}
          path: ${{ matrix.dir }}/cahier_des_charges_${{ matrix.lang }}.pdf
          if-no-files-found: error
