; ===========================================================================
; ConfigZumm.ini — configuration metier de Zümm
;
; Gabarit a copier en `ConfigZumm.ini` (non versionne). Le nom du fichier et
; les cles ne sont PAS traduits : ils sont identiques en francais, anglais et
; arabe. Seule la prose des commentaires peut l'etre.
;
; SPRINT-00 : gabarit et point de montage seulement. Le chargement effectif et
; la relecture a chaud sont livres par l'US-025 au SPRINT-01.
; Aucun secret ici : identifiants et mots de passe passent par l'environnement.
; ===========================================================================

[application]
; Langue source du produit ; en/ar en sont des traductions.
langue_par_defaut = fr
langues_actives = fr,en,ar

[seuils]
; Seuils metier demontres en revue de SPRINT-01.
; Les valeurs definitives proviennent du cahier des charges, pas de ce gabarit.
poids_ruche_alerte_kg = 15
temperature_min_celsius = 32
temperature_max_celsius = 36
humidite_max_pourcent = 70

[visites]
; Nombre de jours au-dela duquel une ruche est signalee comme non visitee.
delai_alerte_jours = 21

[carte]
; Precision d'affichage des positions pour les profils non proprietaires.
; La position exacte d'un rucher est une donnee sensible (risque de vol) :
; elle n'est jamais livree a un role non autorise (cf. US-003, RBAC).
arrondi_degres_public = 2
