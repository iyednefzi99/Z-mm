# ═══════════════════════════════════════════════════════════
# Docker Compose - Stack Zümm Complète
# ═══════════════════════════════════════════════════════════

services:
  # ─── Base de données PostgreSQL + PostGIS + TimescaleDB ───
  postgres:
    image: timescale/timescaledb-ha:pg16-ts2.14
    container_name: zumm-postgres
    environment:
      POSTGRES_DB: zumm
      POSTGRES_USER: zumm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zumm_secure}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    # Pas de port publié sur l'hôte : la base n'est joignable que par le
    # réseau interne. Accès local ponctuel via `docker compose exec`.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zumm -d zumm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zumm-network

  # ─── Fournisseur d'identité Keycloak (OIDC) ───
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: zumm-keycloak
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/zumm
      KC_DB_USERNAME: zumm
      KC_DB_PASSWORD: ${DB_PASSWORD:-zumm_secure}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD requis}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - zumm-network

  # ─── Application Spring Boot (Zümm) ───
  zumm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zumm-app
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zumm
      SPRING_DATASOURCE_USERNAME: zumm
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-zumm_secure}
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/zumm
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID: ${OAUTH_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
    # Aucun port publié sur l'hôte : l'application n'est atteignable qu'à
    # travers le proxy inverse (terminaison TLS, en-têtes, limitation de débit).
    expose:
      - "8080"
    volumes:
      - zumm_uploads:/app/uploads
      - ./ConfigZumm.ini:/app/config/ConfigZumm.ini:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zumm-network

  # ─── Reverse Proxy (Nginx) ───
  nginx:
    image: nginx:alpine
    container_name: zumm-nginx
    depends_on:
      - zumm-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - zumm-network

  # ─── Monitoring: Prometheus ───
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: zumm-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - zumm-network

  # ─── Monitoring: Grafana ───
  grafana:
    image: grafana/grafana:11.1.0
    container_name: zumm-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - zumm-network

  # ─── Logs: ELK (optionnel) ───
  # elasticsearch:
  #   image: elasticsearch:8.11.0
  #   ...

volumes:
  postgres_data:
  zumm_uploads:
  prometheus_data:
  grafana_data:

networks:
  zumm-network:
    driver: bridge
