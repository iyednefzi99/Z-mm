events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # Limitation de debit : une API de terrain n'a aucune raison de recevoir
    # des rafales, et les positions de ruchers valent d'etre protegees du
    # moissonnage automatise.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # ─── Redirection systematique vers HTTPS ───
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── Terminaison TLS ───
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/zumm.crt;
        ssl_certificate_key /etc/nginx/ssl/zumm.key;

        # TLS 1.3 exige par le cahier des charges ; 1.2 conserve en repli pour
        # les terminaux de terrain plus anciens.
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "same-origin" always;

        # Taille des televersements : photos de visite (US-010).
        client_max_body_size 20m;

        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://backend:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Sonde de vie, sans exposer le reste d'Actuator.
        location = /actuator/health {
            proxy_pass http://backend:8080/actuator/health;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Le reste d'Actuator n'est jamais joignable depuis l'exterieur.
        location /actuator/ {
            return 404;
        }

        location / {
            proxy_pass http://keycloak:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
