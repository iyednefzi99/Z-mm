events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # Limitation de debit : une API de terrain n'a aucune raison de recevoir
    # des rafales, et les positions de ruchers valent d'etre protegees du
    # moissonnage automatise.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # ─── Redirection systematique vers HTTPS ───
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── Terminaison TLS ───
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/zumm.crt;
        ssl_certificate_key /etc/nginx/ssl/zumm.key;

        # US-023 : TLS 1.3 exige par le cahier des charges. On l'impose comme
        # plancher (les navigateurs cibles de la PWA le supportent tous). Les
        # suites 1.3 sont fixees explicitement ; `ssl_ciphers` ne concerne que
        # 1.2 et n'a donc pas d'effet ici, mais reste au cas ou un repli serait
        # reintroduit.
        ssl_protocols       TLSv1.3;
        ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "same-origin" always;

        # Taille des televersements : photos de visite (US-010).
        client_max_body_size 20m;

        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://backend:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Sonde de vie, sans exposer le reste d'Actuator.
        location = /actuator/health {
            proxy_pass http://backend:8080/actuator/health;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Le reste d'Actuator n'est jamais joignable depuis l'exterieur.
        location /actuator/ {
            return 404;
        }

        location / {
            proxy_pass http://keycloak:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
