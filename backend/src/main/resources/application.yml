spring:
  application:
    name: zumm-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zumm}
    username: ${SPRING_DATASOURCE_USERNAME:zumm}
    password: ${SPRING_DATASOURCE_PASSWORD:zumm_secure}
  jpa:
    # Flyway est seul proprietaire du schema : Hibernate ne le modifie jamais.
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    # Par défaut, Flyway utilise la source de données principale (= le rôle `zumm`
    # propriétaire, en local comme en test). En PRODUCTION, l'application se
    # connecte avec le rôle non-privilégié `zumm_app`, tandis que Flyway (qui
    # exige des droits DDL) est ramené au propriétaire par les variables
    # d'environnement SPRING_FLYWAY_URL / SPRING_FLYWAY_USER / SPRING_FLYWAY_PASSWORD
    # (lues automatiquement par Spring Boot ; cf. docker-compose.yml).
    #
    # Placeholders du rôle applicatif créé par V3 (durcissement RLS, ADR-001).
    # Aucun secret versionné : DB_APP_PASSWORD alimente ce mot de passe et celui
    # de la source de données applicative en production.
    placeholders:
      role_app: ${DB_APP_USER:zumm_app}
      motdepasse_app: ${DB_APP_PASSWORD:zumm_app_dev}
  security:
    oauth2:
      resourceserver:
        jwt:
          # Emetteur des jetons. Keycloak expose ses cles publiques sous
          # <issuer-uri>/protocol/openid-connect/certs : aucun secret ici.
          issuer-uri: ${ZUMM_OIDC_ISSUER_URI:http://localhost:8081/realms/zumm}
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  web:
    locale: fr
    locale-resolver: accept-header

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        # Actuator n'est jamais joignable depuis l'exterieur : le proxy inverse
        # ne laisse passer que /actuator/health (cf. infra/nginx/nginx.conf).
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: zumm
  observations:
    key-values:
      application: zumm

zumm:
  nom: Zumm
  version: 0.1.0-SNAPSHOT
  # Le francais est la langue source ; en/ar en sont des traductions.
  langues-actives:
    - fr
    - en
    - ar

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.zumm: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

management:
  endpoint:
    health:
      show-details: never
