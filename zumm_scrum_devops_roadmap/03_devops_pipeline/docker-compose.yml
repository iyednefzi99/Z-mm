# ═══════════════════════════════════════════════════════════
# Docker Compose - Stack Zümm Complète
# ═══════════════════════════════════════════════════════════
version: '3.8'

services:
  # ─── Base de données PostgreSQL + PostGIS ───
  postgres:
    image: postgis/postgis:15-3.4
    container_name: zumm-postgres
    environment:
      POSTGRES_DB: zumm
      POSTGRES_USER: zumm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zumm_secure}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zumm -d zumm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zumm-network

  # ─── Application WildFly (Zümm) ───
  zumm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zumm-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: zumm
      DB_USER: zumm
      DB_PASSWORD: ${DB_PASSWORD:-zumm_secure}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD}
    ports:
      - "8080:8080"
      - "8443:8443"
      - "9990:9990"
    volumes:
      - zumm_uploads:/opt/jboss/wildfly/standalone/uploads
      - ./ConfigZumm.ini:/opt/jboss/wildfly/standalone/configuration/ConfigZumm.ini:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/zumm/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zumm-network

  # ─── Reverse Proxy (Nginx) ───
  nginx:
    image: nginx:alpine
    container_name: zumm-nginx
    depends_on:
      - zumm-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - zumm-network

  # ─── Monitoring: Prometheus ───
  prometheus:
    image: prom/prometheus:latest
    container_name: zumm-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - zumm-network

  # ─── Monitoring: Grafana ───
  grafana:
    image: grafana/grafana:latest
    container_name: zumm-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - zumm-network

  # ─── Logs: ELK (optionnel) ───
  # elasticsearch:
  #   image: elasticsearch:8.11.0
  #   ...

volumes:
  postgres_data:
  zumm_uploads:
  prometheus_data:
  grafana_data:

networks:
  zumm-network:
    driver: bridge
